use-case-1:
  "initial_message": "In this use-case, you will be asked a series of questions based on the module 1 of the use-case documentation. Therefore, please check the use-case documentation at the following link before proceeding. \n \nThe questions will be based on the config file and the steps to run the model. You will be required to update the config file based on your answers to the questions. The config file [cyan]`config.KZ.yaml`[/cyan] will be updated automatically after you answer all the questions correctly."
  "questionnaire": [{"id": "Q1", "question": "What config parameter needs to be updated to model PyPSA-Earth for Kazakhstan?", "hints": "One of these config parameters needs to be updated: ['countries', 'sub-region']", "answer": "countries"}, {"id": "Q2", "question": "Which of the following is the right format to update the `countries` parameter to Kazakhstan in the config file?", "choices": ["KZ", "Kazakhstan", "KAZ"], "hints": "The answer should be the 2-letter country code for Kazakhstan.", "answer": "KZ"}, {"id": "Q3", "question": "To change the temporal resolution of the electricity model, which config parameter needs to be updated?", "choices": ["snapshots", "scenario.opts", "scenario.sopts", "scenario.planning_horizons"], "hints": "The answer should be one of the parameters under the `scenario` section in the config file.", "answer": "scenario.opts"}, {"id": "Q4", "question": "Enter the temporal resolution of the electricity model to be 6 hours in the config file.", "answer": "6h", "hints": "The answer should have the format of a number followed by 'h' to represent hours."}, {"id": "Q5", "question": "Which one of the following options is the right way to run the model?", "choices": ["snakemake --configfile config.default.yaml", "snakemake -call solve_all_networks --configfile config.KZ.yaml", "snakemake solve_network"], "hints": "The answer should be the command that runs the model with the updated config file for Kazakhstan.", "answer": "snakemake -call solve_all_networks --configfile config.KZ.yaml"}]
  "failure_message": "Wrong answer entered. Please try again."
  "success_message": "Great job!!! Correct answer entered."
  "exit_message": "Congratulations!!! Module completed."
  "config_update": {"Q1": ["Q2"], "Q3": ["Q4"]}

use-case-2:
  "initial_message": "In this use-case, you will be asked a series of questions based on the module 2 of the use-case documentation. Therefore, please check the use-case documentation at the following link before proceeding. \n \nThe questions will be related to analysing the network results.\n\nWhen answering the questions, please refer to the network object `n` that contains the results of the model run. Also ensure that the answers are entered as [cyan]`n.<component>.<attribute>`[/cyan]."
  "questionnaire": [{"id": "Q1", "question": "In the network results, which component provides information about the temporal resolution of the model?", "hints": "If `n` is the name of the network, then print `n`. The answer will be one of the attributes of the network object.", "answer": "n.snapshots"}, {"id": "Q2", "question": "If a model has a temporal resolution of 8 hours and is run for a total of 10 days, how many snapshots will be present in the network results?", "hints": "The answer can be calculated by dividing the total number of hours in 10 days by the temporal resolution of 8 hours.", "answer": "30"}, {"id": "Q3", "question": "How would you obtain the dispatch of generators in the model?", "choices": ["n.generators_t.p", "n.generators.p", "n.generators_t.p_nom", "n.generators.p_nom"], "hints": "It is attached to a dynamic attribute of the generator component.", "answer": "n.generators_t.p"}, {"id": "Q4", "question": "If the installed capacity of a generator is 50 MW and the optimal installed capacity is 55 MW, what is the newly built capacity of the generator? (Express the answer as a number in MW without the unit)", "answer": "5", "hints": "The newly built capacity is the difference between the optimal installed capacity and the initial installed capacity."}, {"id": "Q5", "question": "What component of the network provides information about the marginal cost of a generator?", "choices": ["n..generators.cost", "n.marginal_cost", "n.statistics().marginal_cost", "n.generators.marginal_cost"], "hints": "Check the static attributes of the generator component.", "answer": "n.generators.marginal_cost"}, {"id": "Q6", "question": "How has the battery been modelled in this particular pypsa network for Kazakhstan?", "choices": ["store + 2 links", "store + 1 link", "only store", "only storage unit", "storage unit + 1 link"], "hints": "Imagine the number of processes required to charge and discharge the battery. Account for each process as being represented by a component. This way, you have one component for charging process, one component for discharging process and one component to track the energy stored in the battery. Based on this information, you can determine the correct answer.", "answer": "store + 2 links"}, {"id": "Q7", "question": "If the `p_nom` of a generator is 100 MW and the p_max_pu at a particular snapshot is 0.5, what is the maximum power output of the generator at that snapshot? (Express the answer as a number in MW without the unit)", "answer": "50", "hints": "`p_nom` refers to the nominal power capacity of the generator, while `p_max_pu` refers to the maximum power output of the generator at a particular snapshot as a fraction of its nominal capacity."}, {"id": "Q8", "question": "Can load shedding generators be expanded in the model? (Yes/No)", "answer": "No", "hints": "Load shedding generators are a design artefact of the model to allow the model to handle demand-supply imbalances. They are not physical generators and their capacities match the peak demand at that particular node."}, {"id": "Q9", "question": "How would you obtain the total system cost of the model?", "choices": ["n.objective", "n.objective_cost", "n.objective_value", "n.objective_function"], "answer": "n.objective"}, {"id": "Q10", "question": "What does the p_nom of a electrolysis link in n.links represent in the model?", "choices": ["The maximum power output of the electrolysis link", "The minimum power output of the electrolysis link", "The average power output of the electrolysis link"], "answer": "The maximum power output of the electrolysis link", "hints": "Imagine the electrolysis link as a generator that converts electricity into hydrogen."}]
  "failure_message": "Wrong answer entered. Please try again."
  "success_message": "Great job!!! Correct answer entered."
  "exit_message": "Congratulations!!! Module completed."


use-case-3:
  "initial_message": "In this use-case, you will be asked a series of questions based on the module 3 of the use-case documentation. Therefore, please check the use-case documentation at the following link before proceeding. \n \nThe questions will be related to setting the config options for demand modelling."
  "questionnaire": [{"id": "Q1", "question": "How is the total demand of the network obtained in the model?", "hints": "The total demand of the network can be accessed through the `n.loads_t.p` attribute, which is a dynamic attribute of the load component. Do not forget to account for the temporal granularity", "choices": ["n.loads.p", "n.loads_t.p", "n.loads_t.p.sum()", "n.loads_t.p_set.multiply(n.snapshot_weightings.generators, axis=0).sum().sum()"], "answer": "n.loads_t.p_set.multiply(n.snapshot_weightings.generators, axis=0).sum().sum()"}, {"id": "Q2", "question": "What is the difference between `p_set` and `p` in `n.loads_t` object of the pypsa network?", "hints": "Check what is empty in `n.loads_t` in the pre-network file", "choices": ["`p_set`: setpoint, `p`: Actual demand", "`p_set`: Actual demand, `p`: setpoint", "`p_set`: demand profile, `p`: total demand"], "answer": "`p_set`: setpoint, `p`: Actual demand"}, {"id": "Q3", "question": "You have already run the model using the GEGIS load source. When changing the load source to demand cast , what settings need to be changed in the config file?", "hints": "Check the `load_options` and `snapshots` section in the config file", "choices": ["load_options.source,load_options.weather_year,load_options.prediction_year,snapshots.start,snapshots.end", "load_options.source,load_options.weather_year", "load_options.source,load_options.prediction_year", "load_options.source,load_options.weather_year,load_options.prediction_year"], "answer": "load_options.source,load_options.weather_year,load_options.prediction_year,snapshots.start,snapshots.end"}, {"id": "Q4", "question": "For running the model with demand cast load source, what is the right format to update the `load_options.source` parameter in the config file?", "hints": "Check the comment provided in the config.default.yaml file for the possible options for the `load_options.source` parameter.", "answer": "demcast"}, {"id": "Q5", "question": "Does setting prediction year to 2040 influence the model decisions? (Yes/No)", "hints": "Check if prediction_year is a valid option for `demcast` in the tutorial.", "answer": "No"}, {"id": "Q6", "question": "If the snapshot start and end year is 2026, can the model run successfully with demandcast? (Yes/No)", "hints": "Check the valid range of the `demcast` dataset in the tutorial.", "answer": "No"}, {"id": "Q7", "question": "If the snapshot start and end year is 2013, what should `load_options.weather_year` be set to? (Enter year in yyyy format)", "hints": "Same as snapshot year", "answer": 2013, "type": int}, {"id": "Q8", "question": "In the following list of rules, which rule do you think would be the first to be rerun, if weather year and snapshots are set to 2020", "hints": "Think of which of the datasets is most tightly linked to the weather year.", "choices": ["build_cutout", "retrieve_cost", "add_electricity"], "answer": "build_cutout"}]
  "failure_message": "Wrong answer entered. Please try again."
  "success_message": "Great job!!! Correct answer entered."
  "exit_message": "Congratulations!!! Module completed."
  "config_update": {"load_options.source": "Q4", "load_options.weather_year": "Q7", "load_options.scale": 1}
