enable:
  # ----------------- Retrieving data -----------------
  retrieve_databundle: true # recommended for first run
  download_osm_data: true # download OpenStreetMap data for the above given countries
  retrieve_cutout: true
  retrieve_cost_data: true # false: use existing data/costs.csv
  retrieve_databundle_sector: true
  download_global_buildings: false # download GlobalMLBuildingFootprints data for the above given countries
  # ----------------- Building locally -----------------
  build_cutout: false # requires CDS API key; uses snapshots and countries
  build_natura_raster: false
  # ----------------- Advanced -----------------
  progress_bar: true
  custom_busmap: false # optional override for cluster_network busmap
