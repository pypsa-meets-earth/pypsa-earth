version: 0.8.0
tutorial: true


countries: ["ZM"]

enable:
  retrieve_databundle: true
  retrieve_databundle_sector: true
  retrieve_cutout: true
  build_natura_raster: true
  progress_bar: false

data:
  hydrobasins:
    source: tutorial
    version: latest
  irena:
    source: primary
    version: latest
  landcover:
    source: primary
    version: Mar2026

scenario:
  clusters: [6]
  opts: [Co2L-4H]

snapshots:
  start: "2013-03-1"
  end: "2013-03-7"


clean_osm_data_options:
  threshold_voltage: 35000

base_network:
  min_voltage_substation_offshore: 35000
  min_voltage_rebase_voltage: 35000


electricity:
  co2limit: 1.487e+9
  co2base: 1.487e+9
  automatic_emission: true


atlite:
  nprocesses: 4
  cutouts:
    # use 'base' to determine geographical bounds and time span from config
    # base:
    # module: era5
    zm-2013-tutorial-era5: {}

# Cutout definitions are needed to re-write those defined
# in config.tuturial.yaml (needs fixing in the upstream)
renewable:
  onwind:
    cutout: zm-2013-tutorial-era5
  offwind-ac:
    cutout: zm-2013-tutorial-era5
  offwind-dc:
    cutout: zm-2013-tutorial-era5
  solar:
    cutout: zm-2013-tutorial-era5
  hydro:
    cutout: zm-2013-tutorial-era5
    hydrobasins_level: 4
    hydro_max_hours: "energy_capacity_totals_by_country"
  csp:
    cutout: zm-2013-tutorial-era5


solving:
  solver:
    name: glpk
    options: glpk-default
validation:
  interconnectors:
    enable: true
    download_data: true
  custom_powerplants:
    enable: true
    download_data: true
